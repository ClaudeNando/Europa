<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Europa 2026">
<link rel="manifest" href="manifest.json">
<title>Europa 2026 ✈️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --card: #22223b;
    --accent: #e8b86d;
    --accent2: #c77dff;
    --manha: #f4a261;
    --tarde: #4cc9f0;
    --noite: #7209b7;
    --text: #e8e8f0;
    --muted: #888898;
    --border: rgba(232,184,109,0.15);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 0;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .search-wrap {
    position: relative; flex: 1; margin: 0 12px;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 12px 8px 34px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap::before {
    content: '🔍';
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 13px; pointer-events: none;
  }
  input::placeholder { color: var(--muted); }

  /* ── NAV TABS ── */
  nav {
    display: flex; gap: 4px;
    overflow-x: auto; padding-bottom: 0;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(232,184,109,0.06);
  }
  .tab:hover { color: var(--text); }

  /* ── MAIN CONTENT ── */
  main {
    padding: 16px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── TODAY BANNER ── */
  .today-banner {
    background: linear-gradient(135deg, #16213e, #0f3460);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .today-banner .emoji { font-size: 28px; }
  .today-banner h2 { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--accent); }
  .today-banner p { font-size: 13px; color: var(--muted); }

  /* ── DAY CARD ── */
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .day-card:hover { box-shadow: 0 4px 24px rgba(232,184,109,0.1); }

  .day-header {
    display: flex; align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }

  .day-num {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0f0f1a;
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 13px;
    border-radius: 10px;
    padding: 4px 10px;
    flex-shrink: 0;
  }

  .day-info { flex: 1; min-width: 0; }
  .day-date { font-size: 12px; color: var(--muted); }
  .day-city {
    font-size: 16px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .day-chevron {
    color: var(--muted);
    font-size: 16px;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .day-card.open .day-chevron { transform: rotate(180deg); }

  /* Hotel strip */
  .hotel-strip {
    padding: 0 16px 10px;
    font-size: 12px; color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .hotel-strip .icon { color: var(--accent); }

  /* ── EVENTS ── */
  .events {
    display: none;
    padding: 12px 16px 14px;
  }
  .day-card.open .events { display: block; }

  .period-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    margin: 10px 0 6px;
    padding-left: 4px;
  }
  .period-MANHÃ { color: var(--manha); }
  .period-TARDE { color: var(--tarde); }
  .period-NOITE { color: var(--accent2); }

  .event-item {
    display: flex; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    align-items: flex-start;
  }
  .event-item:last-child { border-bottom: none; }

  .event-time {
    font-size: 12px; font-weight: 600;
    color: var(--accent);
    min-width: 38px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .event-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 7px;
    flex-shrink: 0;
  }

  .event-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.45;
  }

  /* ── CITY VIEW ── */
  .city-section {
    margin-bottom: 20px;
  }
  .city-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .city-period { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .city-hotel {
    background: rgba(232,184,109,0.08);
    border: 1px solid rgba(232,184,109,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px; margin-bottom: 10px;
    display: flex; gap: 8px; align-items: center;
  }

  .city-days-list { display: flex; flex-direction: column; gap: 8px; }

  /* ── SEARCH RESULTS ── */
  .search-result {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .search-result .sr-day { font-size: 12px; color: var(--accent); font-weight: 600; }
  .search-result .sr-city { font-size: 11px; color: var(--muted); }
  .search-result .sr-text { font-size: 14px; margin-top: 4px; }

  /* ── EMPTY / OFFLINE ── */
  .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }

  .offline-badge {
    background: rgba(199,125,255,0.15);
    border: 1px solid rgba(199,125,255,0.3);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--accent2);
    display: none;
  }
  .offline-badge.show { display: inline-block; }

  /* ── TODAY HIGHLIGHT ── */
  .is-today .day-header { background: rgba(232,184,109,0.06); }
  .is-today .day-num { animation: pulse 2s infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ── ANIMATIONS ── */
  .day-card { animation: fadeUp .3s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Spinner */
  .spinner {
    display: none; text-align: center; padding: 48px;
    color: var(--muted);
  }

  /* Progress bar */
  .progress-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin-top: 12px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --card: #ffffff;
      --text: #1a1a2e;
      --muted: #6b6b7e;
      --border: rgba(0,0,0,0.1);
    }
    .logo { background: linear-gradient(135deg, #b5892a, #7209b7); -webkit-background-clip: text; }
    header { background: rgba(245,245,240,0.95); }
    .today-banner { background: linear-gradient(135deg, #eee, #e0e0f5); }
  }
</style>
</head>

</header>

<main id="main"></main>

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
let currentView = 'dias';
let searchQuery = '';
let openDays = new Set();

const WEEK = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const MONTHS = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDate(str) {
  const d = parseDate(str);
  return `${WEEK[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

function getDayNum(str) {
  const start = parseDate('2026-04-23');
  const day = parseDate(str);
  return Math.round((day - start) / 86400000) + 1;
}

function isToday(str) {
  const now = new Date();
  const d = parseDate(str);
  return now.getFullYear() === d.getFullYear() &&
         now.getMonth() === d.getMonth() &&
         now.getDate() === d.getDate();
}

function isTripDay() {
  const start = parseDate('2026-04-23');
  const end = parseDate('2026-05-16');
  const now = new Date();
  now.setHours(0,0,0,0);
  return now >= start && now <= end;
}

// ═══════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════
function renderEventList(eventos) {
  if (!eventos.length) return '<div style="color:var(--muted);font-size:13px;padding:4px 0">Sem programação detalhada</div>';

  let html = '';
  let lastPeriod = null;

  eventos.forEach(ev => {
    if (ev.periodo && ev.periodo !== lastPeriod) {
      const icons = {MANHÃ:'🌅',TARDE:'☀️',NOITE:'🌙'};
      html += `<div class="period-label period-${ev.periodo}">${icons[ev.periodo] || ''} ${ev.periodo}</div>`;
      lastPeriod = ev.periodo;
    }
    html += `<div class="event-item">
      <span class="event-time">${ev.hora || ''}</span>
      <span class="event-dot"></span>
      <span class="event-text">${ev.descricao}</span>
    </div>`;
  });

  return html;
}

function renderHotel(day) {
  const h = day.hotel_fernando;
  if (!h) return '';
  const parts = h.split(' - ');
  const nome = parts[0];
  const plataforma = parts[1] || '';
  return `<div class="hotel-strip">
    <span class="icon">🏨</span>
    <span>${nome}${plataforma ? ` <span style="color:var(--muted)">(${plataforma})</span>` : ''}</span>
  </div>`;
}

function renderDayCard(day, autoOpen = false) {
  const todayClass = isToday(day.data) ? 'is-today' : '';
  const openClass = (openDays.has(day.data) || autoOpen) ? 'open' : '';
  const dayNum = getDayNum(day.data);

  return `<div class="day-card ${todayClass} ${openClass}" data-date="${day.data}">
    <div class="day-header" onclick="toggleDay('${day.data}')">
      <div class="day-num">Dia ${dayNum}</div>
      <div class="day-info">
        <div class="day-date">${formatDate(day.data)}</div>
        <div class="day-city">${day.cidade}</div>
      </div>
      <div class="day-chevron">▼</div>
    </div>
    ${renderHotel(day)}
    <div class="events">${renderEventList(day.eventos)}</div>
  </div>`;
}

function toggleDay(date) {
  if (openDays.has(date)) {
    openDays.delete(date);
  } else {
    openDays.add(date);
  }
  const card = document.querySelector(`[data-date="${date}"]`);
  if (card) card.classList.toggle('open');
}

// ── VIEWS ──
function renderDias() {
  const todayDay = DATA.find(d => isToday(d.data));
  let html = '';

  if (todayDay) {
    openDays.add(todayDay.data);
  }

  html += DATA.map(d => renderDayCard(d)).join('');
  return html;
}

function renderCidades() {
  const cities = {};
  DATA.forEach(day => {
    const base = day.cidade.split(/[→\/]/)[0].trim();
    if (!cities[base]) cities[base] = [];
    cities[base].push(day);
  });

  let html = '';
  Object.entries(cities).forEach(([city, days]) => {
    const dates = days.map(d => formatDate(d.data));
    const periodo = dates.length > 1
      ? `${dates[0]} – ${dates[dates.length-1]}`
      : dates[0];
    const hotels = [...new Set(days.map(d => d.hotel_fernando).filter(Boolean))];

    html += `<div class="city-section">
      <div class="city-title">${city}</div>
      <div class="city-period">📅 ${periodo}</div>
      ${hotels.map(h => {
        const [nome, plat] = h.split(' - ');
        return `<div class="city-hotel">🏨 <strong>${nome}</strong>${plat ? ` — ${plat}` : ''}</div>`;
      }).join('')}
      <div class="city-days-list">
        ${days.map(d => renderDayCard(d)).join('')}
      </div>
    </div>`;
  });

  return html;
}

function renderHoje() {
  const now = new Date();
  const start = parseDate('2026-04-23');
  const end = parseDate('2026-05-16');

  if (now < start) {
    const diff = Math.ceil((start - now) / 86400000);
    return `<div class="today-banner">
      <div class="emoji">✈️</div>
      <div>
        <h2>A viagem começa em ${diff} dias!</h2>
        <p>23 de abril de 2026 — Rumo à Europa!</p>
      </div>
    </div>` + renderDias();
  }

  if (now > end) {
    return `<div class="today-banner">
      <div class="emoji">🏠</div>
      <div>
        <h2>Viagem concluída!</h2>
        <p>Que memórias incríveis 🇪🇺</p>
      </div>
    </div>`;
  }

  const todayData = DATA.find(d => isToday(d.data));
  if (!todayData) return '<div class="empty"><div class="icon">📅</div><p>Sem dados para hoje</p></div>';

  const dayNum = getDayNum(todayData.data);
  const totalDays = 24;
  const pct = Math.round((dayNum / totalDays) * 100);

  return `<div class="today-banner">
    <div class="emoji">📍</div>
    <div style="flex:1">
      <h2>Hoje — Dia ${dayNum} de ${totalDays}</h2>
      <p>${todayData.cidade} &nbsp;·&nbsp; ${formatDate(todayData.data)}</p>
      <div style="background:rgba(255,255,255,0.1);border-radius:4px;height:4px;margin-top:8px">
        <div style="background:linear-gradient(90deg,var(--accent),var(--accent2));height:4px;border-radius:4px;width:${pct}%"></div>
      </div>
    </div>
  </div>` + renderDayCard(todayData, true);
}

function renderSearch(q) {
  const lq = q.toLowerCase();
  const results = [];

  DATA.forEach(day => {
    day.eventos.forEach(ev => {
      if (ev.descricao.toLowerCase().includes(lq) || day.cidade.toLowerCase().includes(lq)) {
        results.push({ day, ev });
      }
    });
  });

  if (!results.length) {
    return `<div class="empty"><div class="icon">🔍</div><p>Nenhum resultado para "<strong>${q}</strong>"</p></div>`;
  }

  return results.map(({day, ev}) => `
    <div class="search-result">
      <div class="sr-day">${formatDate(day.data)} · Dia ${getDayNum(day.data)}</div>
      <div class="sr-city">${day.cidade}</div>
      <div class="sr-text">${ev.hora ? `<strong>${ev.hora}</strong> — ` : ''}${ev.descricao}</div>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════════
// RENDER ENGINE
// ═══════════════════════════════════════════════
function render() {
  const main = document.getElementById('main');

  if (searchQuery.length >= 2) {
    main.innerHTML = renderSearch(searchQuery);
    return;
  }

  if (currentView === 'dias') main.innerHTML = renderDias();
  else if (currentView === 'cidades') main.innerHTML = renderCidades();
  else if (currentView === 'hoje') main.innerHTML = renderHoje();

  // Scroll to today
  if (currentView === 'dias' || currentView === 'hoje') {
    const todayCard = document.querySelector('.is-today');
    if (todayCard) {
      setTimeout(() => todayCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
    }
  }
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentView = tab.dataset.view;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  render();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// Offline detection
window.addEventListener('online', () => document.getElementById('offlineBadge').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offlineBadge').classList.add('show'));
if (!navigator.onLine) document.getElementById('offlineBadge').classList.add('show');

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
if (isTripDay()) {
  currentView = 'hoje';
  document.querySelector('[data-view="hoje"]').classList.add('active');
  document.querySelector('[data-view="dias"]').classList.remove('active');
}

render();

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
